<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#155B67">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diagnóstika">
<title>Diagnóstika — Painel Técnico</title>
<link rel="manifest" href="manifest.json">
<style>
/* ── Reset & Tokens ─────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#155B67;--teal-dk:#0D3C44;--teal-md:#1E7A8A;
  --turq:#00B4AC;--turq-lt:#CCF0EE;--turq-dk:#008A83;
  --lime:#8DB72A;--lime-lt:#EDF5D8;
  --red:#C00000;--red-lt:#FFEAEA;--red-md:#E53935;
  --green:#1B8A4A;--green-lt:#E8F5EE;
  --gray:#F0F4F5;--gray2:#E0EAEC;--gray3:#A8BFC2;--gray4:#5A7A7E;
  --white:#FFFFFF;--text:#1A2E31;--text2:#4A6568;
  --shadow:0 2px 12px rgba(21,91,103,.12);
  --shadow-lg:0 8px 32px rgba(21,91,103,.18);
  --r:14px;--r-sm:8px;
  --nav-h:64px;--header-h:56px;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--gray);color:var(--text);font-size:15px}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:var(--white);position:relative;overflow:hidden}

/* ── Header ─────────────────────────────────────────────────────────────── */
#header{
  height:var(--header-h);min-height:var(--header-h);
  background:var(--teal);color:var(--white);
  display:flex;align-items:center;gap:8px;padding:0 12px;
  position:relative;z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
#header img{height:48px;object-fit:contain;flex-shrink:0;filter:brightness(0) invert(1)}
#header{height:auto;min-height:64px;padding:6px 12px}
:root{--header-h:64px}
#header-title{flex:1;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:4px}
.icon-btn{width:40px;height:40px;border:none;background:rgba(255,255,255,.15);border-radius:50%;color:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.icon-btn:hover{background:rgba(255,255,255,.25)}
.hidden{display:none!important}

/* ── Main Scroll Area ───────────────────────────────────────────────────── */
#app-body{flex:1;display:flex;overflow:hidden}
#sidenav{display:none}
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + 8px)}

/* ── Bottom Nav ─────────────────────────────────────────────────────────── */
#bottomnav{
  height:var(--nav-h);min-height:var(--nav-h);
  background:var(--white);border-top:1px solid var(--gray2);
  display:flex;align-items:stretch;
  box-shadow:0 -2px 12px rgba(21,91,103,.08);
  position:relative;z-index:10;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:transparent;color:var(--gray3);cursor:pointer;
  font-size:10px;font-weight:500;padding:4px 0;transition:color .2s;
}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-btn.active{color:var(--teal)}
.nav-btn.nav-cta{
  color:var(--white);background:var(--teal);border-radius:0;
  margin:8px 4px;border-radius:12px;flex:1.2;
}
.nav-btn.nav-cta svg{stroke-width:2.5}

/* ── Cards ───────────────────────────────────────────────────────────────── */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:14px 16px 10px;border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:10px}
.card-header h3{font-size:14px;font-weight:700;color:var(--teal)}
.card-body{padding:14px 16px}

/* ── Home View ───────────────────────────────────────────────────────────── */
.home-hero{
  background:linear-gradient(135deg,var(--teal-dk) 0%,var(--teal) 60%,var(--teal-md) 100%);
  padding:24px 20px 28px;color:var(--white);
}
.home-hero h1{font-size:20px;font-weight:700;margin-bottom:4px}
.home-hero p{font-size:13px;opacity:.8}
.home-hero .date{font-size:12px;opacity:.65;margin-top:8px}
.condo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.condo-card{
  background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);
  overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;
  border:2px solid transparent;
}
.condo-card:active{transform:scale(.97)}
.condo-card.condo-mc{border-color:var(--teal)}
.condo-card.condo-mm{border-color:var(--turq)}
.condo-card-top{height:6px}
.condo-mc .condo-card-top{background:var(--teal)}
.condo-mm .condo-card-top{background:var(--turq)}
.condo-card-body{padding:12px 12px 14px}
.condo-card-body h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.condo-card-body h3 .emb{width:24px;height:24px;flex-shrink:0;border-radius:5px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.condo-card-body h3 .emb svg{width:100%;height:100%;display:block}
.condo-card-body .freq{font-size:11px;color:var(--text2);margin-bottom:6px;line-height:1.4}
.condo-card-body .sindico{font-size:10.5px;color:var(--text2);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.condo-card-body .endereco{font-size:10px;color:var(--gray4);margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.condo-card-body .prox-act{font-size:10px;color:var(--text2);background:var(--gray);padding:5px 7px;border-radius:5px;margin-bottom:8px;line-height:1.4}
.condo-card-body .prox-act b{color:var(--teal);font-size:10.5px}
.condo-card-body .card-actions{display:flex;gap:5px}
.condo-card-body .card-actions button{flex:1;padding:7px 0;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px}
.condo-card-body .btn-pdf-condo{background:var(--white);color:var(--text2);border:1px solid var(--gray2)!important}
.condo-card-body .btn-pdf-condo:hover{background:var(--gray)}
.condo-card-body .btn-visit{
  width:100%;padding:8px 0;border:none;border-radius:8px;
  font-size:12px;font-weight:600;cursor:pointer;color:var(--white);
  transition:opacity .2s;
}
.condo-mc .btn-visit{background:var(--teal)}
.condo-mm .btn-visit{background:var(--turq)}
.section-title{font-size:12px;font-weight:700;color:var(--gray4);text-transform:uppercase;letter-spacing:.6px;padding:16px 16px 8px}
.visit-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--gray2);cursor:pointer;
  transition:background .15s;
}
.visit-item:last-child{border-bottom:none}
.visit-item:hover{background:var(--gray)}
.visit-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.visit-dot.mc{background:var(--teal)}
.visit-dot.mm{background:var(--turq)}
.visit-info{flex:1}
.visit-info strong{display:block;font-size:13px;font-weight:600}
.visit-info span{font-size:12px;color:var(--text2)}
.visit-date{font-size:12px;color:var(--text2);font-weight:500}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-red{background:var(--red-lt);color:var(--red)}
.badge-green{background:var(--green-lt);color:var(--green)}
.badge-gray{background:var(--gray2);color:var(--gray4)}
.badge-turq{background:var(--turq-lt);color:var(--turq-dk)}

/* ── Nova Visita ─────────────────────────────────────────────────────────── */
.form-section{padding:16px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-input{
  width:100%;padding:12px 14px;border:1.5px solid var(--gray2);border-radius:var(--r-sm);
  font-size:15px;color:var(--text);background:var(--white);outline:none;
  transition:border-color .2s;
}
.form-input:focus{border-color:var(--teal)}
.condo-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.condo-opt{
  padding:14px 10px;border:2px solid var(--gray2);border-radius:var(--r);
  text-align:center;cursor:pointer;transition:all .2s;background:var(--white);
}
.condo-opt.selected-mc{border-color:var(--teal);background:rgba(21,91,103,.06)}
.condo-opt.selected-mm{border-color:var(--turq);background:rgba(0,180,172,.06)}
.condo-opt h4{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.condo-opt span{font-size:11px;color:var(--text2)}
.btn-primary{
  width:100%;padding:15px;border:none;border-radius:var(--r-sm);
  background:var(--teal);color:var(--white);font-size:16px;font-weight:700;
  cursor:pointer;transition:background .2s;margin-top:8px;
}
.btn-primary:active{background:var(--teal-dk)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* ── Checklist ───────────────────────────────────────────────────────────── */
.checklist-header{
  background:var(--teal);color:var(--white);
  padding:14px 16px 16px;
}
.checklist-header h2{font-size:16px;font-weight:700;margin-bottom:2px}
.checklist-header p{font-size:12px;opacity:.75;margin-bottom:12px}
.progress-bar{height:6px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--lime);border-radius:3px;transition:width .3s}
.progress-text{font-size:11px;opacity:.75;margin-top:5px}
.group-header{
  background:var(--gray);padding:10px 16px;
  font-size:11px;font-weight:700;color:var(--gray4);text-transform:uppercase;letter-spacing:.6px;
  border-top:1px solid var(--gray2);border-bottom:1px solid var(--gray2);
  display:flex;align-items:center;gap:8px;
}
.group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.checklist-item{
  padding:14px 16px;border-bottom:1px solid var(--gray2);
  transition:background .15s;
}
.checklist-item.status-conforme{background:rgba(27,138,74,.04)}
.checklist-item.status-nao_conforme{background:var(--red-lt)}
.checklist-item.is-critico{border-left:4px solid var(--red)}
.item-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.item-detail{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.4}
.item-critico-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--red);color:var(--white);
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;
  margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px;
}
.status-btns{display:flex;gap:8px}
.status-btn{
  flex:1;padding:9px 4px;border:1.5px solid var(--gray2);border-radius:8px;
  font-size:12px;font-weight:600;cursor:pointer;background:var(--white);
  transition:all .15s;color:var(--text2);text-align:center;
}
.status-btn.active-conforme{background:var(--green-lt);border-color:var(--green);color:var(--green)}
.status-btn.active-nao_conforme{background:var(--red-lt);border-color:var(--red);color:var(--red)}
.status-btn.active-na{background:var(--gray2);border-color:var(--gray3);color:var(--gray4)}
.obs-field{
  margin-top:10px;width:100%;padding:10px 12px;
  border:1.5px solid var(--red);border-radius:8px;
  font-size:13px;color:var(--text);resize:vertical;min-height:60px;
  outline:none;font-family:inherit;
}
.checklist-footer{
  padding:16px;background:var(--white);
  border-top:2px solid var(--gray2);
}
.btn-finish{
  width:100%;padding:16px;border:none;border-radius:var(--r-sm);
  background:var(--lime);color:var(--white);font-size:16px;font-weight:700;
  cursor:pointer;transition:background .2s;
}
.btn-finish:disabled{opacity:.45;cursor:not-allowed}
.btn-finish:not(:disabled):active{background:#7aa024}

/* ── Relatório ───────────────────────────────────────────────────────────── */
.relatorio-header{
  background:linear-gradient(135deg,var(--teal-dk),var(--teal));
  padding:20px 16px;color:var(--white);
}
.relatorio-header h2{font-size:18px;font-weight:700;margin-bottom:3px}
.relatorio-header p{font-size:13px;opacity:.75}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px}
.stat-card{
  text-align:center;padding:14px 8px;border-radius:var(--r);
  border:1.5px solid var(--gray2);
}
.stat-card.green{border-color:var(--green);background:var(--green-lt)}
.stat-card.red{border-color:var(--red);background:var(--red-lt)}
.stat-card.gray{border-color:var(--gray3);background:var(--gray)}
.stat-num{font-size:28px;font-weight:800;line-height:1}
.stat-card.green .stat-num{color:var(--green)}
.stat-card.red .stat-num{color:var(--red)}
.stat-card.gray .stat-num{color:var(--gray4)}
.stat-label{font-size:11px;font-weight:600;margin-top:4px;color:var(--text2)}
.nc-item{padding:12px 16px;border-left:3px solid var(--red);margin:0 16px 10px;border-radius:0 8px 8px 0;background:var(--red-lt)}
.nc-item strong{display:block;font-size:13px;font-weight:700;color:var(--red);margin-bottom:3px}
.nc-item p{font-size:12px;color:var(--text);line-height:1.5}
.obs-section{padding:0 16px 16px}
.obs-general{
  width:100%;padding:12px 14px;border:1.5px solid var(--gray2);
  border-radius:var(--r-sm);font-size:14px;color:var(--text);
  resize:vertical;min-height:80px;outline:none;font-family:inherit;
}
.obs-general:focus{border-color:var(--teal)}
.btn-pdf{
  margin:0 16px;width:calc(100% - 32px);padding:15px;border:none;
  border-radius:var(--r-sm);background:var(--teal);color:var(--white);
  font-size:16px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-pdf:active{background:var(--teal-dk)}

/* ── Histórico ───────────────────────────────────────────────────────────── */
.hist-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-bottom:1px solid var(--gray2);
  cursor:pointer;transition:background .15s;
}
.hist-item:hover{background:var(--gray)}
.hist-icon{
  width:42px;height:42px;border-radius:10px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;font-size:18px;
}
.hist-icon.mc{background:rgba(21,91,103,.1);color:var(--teal)}
.hist-icon.mm{background:rgba(0,180,172,.1);color:var(--turq)}
.hist-info{flex:1;min-width:0}
.hist-info strong{display:block;font-size:14px;font-weight:600;color:var(--text)}
.hist-info span{font-size:12px;color:var(--text2)}
.hist-right{text-align:right;flex-shrink:0}
.hist-right small{font-size:11px;color:var(--gray3);display:block;margin-bottom:4px}
.empty-state{padding:60px 24px;text-align:center;color:var(--gray4)}
.empty-state svg{width:56px;height:56px;stroke:var(--gray3);margin-bottom:16px}
.empty-state h3{font-size:16px;font-weight:600;margin-bottom:6px}
.empty-state p{font-size:13px;line-height:1.5}

/* ── Plano ───────────────────────────────────────────────────────────────── */
.plano-tabs{display:flex;padding:12px 16px;gap:8px}
.plano-tab{
  flex:1;padding:10px;border:1.5px solid var(--gray2);border-radius:8px;
  text-align:center;font-size:12px;font-weight:600;cursor:pointer;
  background:var(--white);color:var(--text2);transition:all .2s;
}
.plano-tab.active-mc{border-color:var(--teal);background:rgba(21,91,103,.08);color:var(--teal)}
.plano-tab.active-mm{border-color:var(--turq);background:rgba(0,180,172,.08);color:var(--turq-dk)}
.plano-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--gray2);
}
.plano-item.is-critico{background:var(--red-lt);border-left:3px solid var(--red)}
.plano-item-left{flex:1;min-width:0}
.plano-item-left strong{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.plano-item-left small{font-size:11px;color:var(--text2);line-height:1.4;display:block;margin-bottom:4px}
.plano-item-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.meta-tag{background:var(--gray);color:var(--text2);font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.meta-tag.teal{background:rgba(21,91,103,.1);color:var(--teal)}
.plano-pri{flex-shrink:0;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;text-align:center}
.pri-alta{background:var(--red-lt);color:var(--red)}
.pri-media{background:var(--turq-lt);color:var(--turq-dk)}
.pri-critico{background:var(--red);color:var(--white)}

/* ── Configurações / Engenheiro ─────────────────────────────────────────── */
.eng-banner{
  background:var(--teal-lt,#e8f4f6);
  border:1.5px solid var(--gray2);border-radius:var(--r-sm);
  padding:12px 14px;margin:16px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
}
.eng-banner svg{flex-shrink:0;stroke:var(--teal)}
.eng-banner span{font-size:13px;color:var(--teal);font-weight:600}

/* ── Modal ───────────────────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:100;padding:0;
}
.modal{
  background:var(--white);width:100%;max-width:480px;
  border-radius:var(--r) var(--r) 0 0;padding:24px;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:17px;font-weight:700;color:var(--text);margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray4);margin-top:-4px}

/* ── Print / PDF ────────────────────────────────────────────────────────── */
@media print{
  body{overflow:visible!important;height:auto!important}
  #app{max-width:100%!important;overflow:visible!important;height:auto!important}
  #header,#bottomnav,#main,#btn-back,#header-actions{display:none!important}
  #print-area{display:none!important} /* nunca imprime - usa-se sempre o preview-overlay */
  @page{margin:16mm;size:A4}
}
#print-area{
  display:none;
  font-family:'Segoe UI',system-ui,sans-serif;
  color:#1A2E31;font-size:12pt;line-height:1.5;
}
.print-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:14pt;border-bottom:2.5pt solid #155B67;margin-bottom:14pt;gap:14pt}
.print-header img{height:72pt;max-width:160pt;object-fit:contain}
.print-header-right{text-align:right;font-size:9pt;color:#5A7A7E}
.print-title{font-size:15pt;font-weight:700;color:#155B67;margin-bottom:3pt}
.print-subtitle{font-size:10pt;color:#5A7A7E;margin-bottom:14pt}
.print-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8pt;margin-bottom:14pt}
.print-info-cell{background:#F0F4F5;padding:8pt 10pt;border-radius:5pt}
.print-info-cell label{display:block;font-size:8pt;color:#5A7A7E;font-weight:700;text-transform:uppercase;margin-bottom:2pt}
.print-info-cell span{font-size:11pt;font-weight:600;color:#1A2E31}
.print-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8pt;margin-bottom:16pt}
.print-stat{text-align:center;padding:10pt;border:1.5pt solid #E0EAEC;border-radius:5pt}
.print-stat.ps-green{border-color:#1B8A4A;background:#E8F5EE}
.print-stat.ps-red{border-color:#C00000;background:#FFEAEA}
.print-stat.ps-gray{border-color:#A8BFC2;background:#F0F4F5}
.print-stat big{display:block;font-size:20pt;font-weight:800;line-height:1}
.print-stat.ps-green big{color:#1B8A4A}
.print-stat.ps-red big{color:#C00000}
.print-stat.ps-gray big{color:#5A7A7E}
.print-stat small{font-size:8pt;font-weight:600;color:#5A7A7E}
.print-section-title{font-size:11pt;font-weight:700;color:#155B67;border-bottom:1pt solid #D6EBED;padding-bottom:4pt;margin-bottom:8pt;margin-top:14pt}
.print-nc-item{margin-bottom:8pt;padding:8pt 10pt;border-left:3pt solid #C00000;background:#FFEAEA;border-radius:0 5pt 5pt 0}
.print-nc-item strong{display:block;font-size:10pt;color:#C00000;font-weight:700}
.print-nc-item p{font-size:10pt;color:#1A2E31;margin-top:2pt}
.print-all-table{width:100%;border-collapse:collapse;font-size:9pt}
.print-all-table th{background:#155B67;color:#fff;padding:5pt 7pt;text-align:left;font-size:8pt;text-transform:uppercase}
.print-all-table td{padding:5pt 7pt;border-bottom:0.5pt solid #E0EAEC;vertical-align:top}
.print-all-table tr:nth-child(even) td{background:#F0F4F5}
.print-all-table .s-c{color:#1B8A4A;font-weight:700}
.print-all-table .s-n{color:#C00000;font-weight:700}
.print-all-table .s-a{color:#A8BFC2}
.print-obs-box{background:#F0F4F5;padding:10pt;border-radius:5pt;font-size:10pt;min-height:40pt;margin-bottom:16pt;white-space:pre-wrap}
.print-sigs{display:grid;grid-template-columns:1fr 1fr;gap:20pt;margin-top:20pt}
.print-sig-line{border-top:1pt solid #1A2E31;padding-top:5pt;font-size:9pt;color:#5A7A7E}
.print-footer{margin-top:20pt;padding-top:8pt;border-top:1pt solid #E0EAEC;font-size:8pt;color:#A8BFC2;text-align:center}
.print-critico-row td{background:#FFEAEA!important}
.print-tag-critico{background:#C00000;color:#fff;font-size:7pt;font-weight:700;padding:1pt 4pt;border-radius:3pt;text-transform:uppercase}

/* ── Calendar Print ──────────────────────────────────────────────────────── */
.cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9pt;margin:10pt 0 5pt}
.cal-m{border:1pt solid #D6EBED;border-radius:4pt;overflow:hidden}
.cal-mh{background:#155B67;color:#fff;text-align:center;padding:3pt 0;font-size:8pt;font-weight:700;letter-spacing:.3pt}
.cal-dh{display:grid;grid-template-columns:repeat(7,1fr);background:#D6EBED;text-align:center}
.cal-dh b{padding:2pt 0;font-size:6.5pt;font-weight:700;color:#0D3C44;display:block;text-align:center}
.cal-dg{display:grid;grid-template-columns:repeat(7,1fr);text-align:center}
.cd-d,.cd-e{font-size:7pt;padding:2pt 0;text-align:center;color:#1A2E31;line-height:1.6}
.cd-v{color:#fff!important;font-weight:700;background:var(--vc);border-radius:50%;margin:1pt auto;display:block;width:14pt;height:14pt;line-height:14pt}
.cal-legend{font-size:8pt;color:#5A7A7E;margin-bottom:12pt;display:flex;align-items:center;gap:6pt}
.cal-leg-dot{width:9pt;height:9pt;border-radius:50%;display:inline-block;flex-shrink:0;vertical-align:middle}
.cal-section-title{font-size:11pt;font-weight:700;color:#155B67;border-bottom:1.5pt solid #D6EBED;padding-bottom:4pt;margin:0 0 8pt}
.cal-table{width:100%;border-collapse:collapse;font-size:7.5pt;margin-top:6pt}
.cal-table th{background:#155B67;color:#fff;padding:4pt 4pt;text-align:center;font-size:6.5pt;white-space:nowrap}
.cal-th-at{text-align:left!important;width:30%}
.cal-th-per{text-align:left!important;width:10%}
.cal-th-m{width:4.5%}
.cal-th-pri{width:7%}
.cal-table td{padding:3pt 4pt;border-bottom:.5pt solid #E0EAEC;vertical-align:middle}
.cal-at{font-weight:600;color:#1A2E31}
.cal-per{color:#5A7A7E;font-size:7pt}
.cal-dot{text-align:center;color:#155B67;font-size:9pt;font-weight:900;line-height:1}
.cal-dot-c{color:#C00000!important}
.cal-grp-row td{background:#D6EBED;font-weight:700;font-size:8pt;color:#155B67;padding:4pt 5pt}
.cal-grp-crit td{background:#FFEAEA!important;color:#C00000!important}
.cal-crit-row td{background:#FFF5F5}
.cal-pri{text-align:center;font-size:6.5pt;font-weight:700;white-space:nowrap}
.cal-pri-critico,.cal-pri-crtico{color:#C00000}
.cal-pri-alta{color:#E65100}
.cal-pri-mdia,.cal-pri-media{color:#1565C0}

/* ── Agenda Unificada Print ──────────────────────────────────────────────── */
.cd-pips{display:flex;justify-content:center;gap:2pt;margin-top:1pt}
.cd-pip{display:inline-block;width:5pt;height:5pt;border-radius:50%;flex-shrink:0}
.cd-pip-mc{background:#155B67}
.cd-pip-mm{background:#00B4AC}
.agenda-table{width:100%;border-collapse:collapse;font-size:9pt;margin-top:8pt}
.agenda-table th{background:#155B67;color:#fff;padding:5pt 8pt;text-align:left;font-size:8pt}
.agenda-table td{padding:5pt 8pt;border-bottom:.5pt solid #E0EAEC;vertical-align:middle}
.agenda-month-hdr td{background:#D6EBED;font-weight:700;font-size:9pt;color:#0D3C44;padding:5pt 8pt;letter-spacing:.3pt;text-transform:uppercase}
.agenda-row-both td{background:#F0FAFA}
.agenda-row-mc td{background:#fff}
.agenda-condo-pill{display:inline-block;padding:2pt 6pt;border-radius:10pt;font-size:8pt;font-weight:700;margin-right:4pt}
.pill-mc{background:#155B67;color:#fff}
.pill-mm{background:#00B4AC;color:#fff}
.agenda-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10pt;margin:12pt 0 16pt}
.agenda-sum-card{border-radius:5pt;padding:10pt;text-align:center}
.agenda-sum-card big{display:block;font-size:18pt;font-weight:800;line-height:1.1}
.agenda-sum-card small{font-size:8pt;font-weight:600;color:#5A7A7E}
.ag-tipo{display:inline-block;font-size:6pt;font-weight:700;padding:1pt 5pt;border-radius:8pt;text-transform:uppercase;letter-spacing:.3pt}
.ag-padrao{background:#E0EAEC;color:#5A7A7E}
.ag-mensal{background:#D6EBED;color:#0D3C44}
.ag-trimestral{background:#00B4AC;color:#fff}
.ag-semestral{background:#8DB72A;color:#fff}
.ag-anual{background:#7B1FA2;color:#fff}
.ag-critico{background:#C00000;color:#fff;font-size:6pt;font-weight:700;padding:1pt 5pt;border-radius:8pt;text-transform:uppercase;display:inline-block;margin-right:3pt}
.ag-items{font-size:7pt;color:#4A6568;line-height:1.5;margin-top:2pt}
.ag-nc{color:#A8BFC2;text-align:center;font-size:9pt}
.agenda-table2{width:100%;border-collapse:collapse;font-size:8pt}
.agenda-table2 th{background:#155B67;color:#fff;padding:4pt 6pt;font-size:7pt;text-align:left}
.agenda-table2 th.th-mm{background:#00B4AC}
.agenda-table2 td{padding:5pt 6pt;border-bottom:.5pt solid #E0EAEC;vertical-align:top}
.agenda-table2 .am-hdr td{background:#D6EBED;font-weight:700;font-size:8pt;color:#0D3C44;letter-spacing:.4pt;text-transform:uppercase;padding:4pt 6pt}
.agenda-table2 .ar-both{background:#F4FCFC}
.agenda-table2 .ar-mc{background:#fff}

/* ── Agenda Screen View ─────────────────────────────────────────────────── */
.av-tabs{display:flex;border-bottom:2px solid var(--gray2);background:var(--white);padding:0 16px;gap:4px}
.av-tab{flex:1;padding:11px 0;border:none;background:none;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.av-tab.at-mc{border-bottom-color:var(--teal);color:var(--teal)}
.av-tab.at-mm{border-bottom-color:var(--turq);color:var(--turq-dk)}
.cal-screen{padding:12px 8px 4px}
.cal-screen .cal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cal-screen .cal-m{border-radius:8px;overflow:hidden;box-shadow:0 1px 6px rgba(21,91,103,.1)}
.cal-screen .cal-mh{font-size:12px;padding:7px 8px}
.cal-screen .cal-dh{font-size:8px;padding:3px 0}
.cal-screen .cal-dg{font-size:10px}
.cal-screen .cd-d{width:calc(100%/7);min-height:22px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;padding:1px 0}
.cal-screen .cd-e{width:calc(100%/7);min-height:22px;display:inline-block}
.cal-screen-legend{display:flex;flex-wrap:wrap;gap:10px;padding:8px 16px 4px;font-size:11px;color:var(--text2);align-items:center}
.prog-mes{font-size:11px;font-weight:700;color:var(--teal-dk);text-transform:uppercase;padding:10px 16px 5px;letter-spacing:.5px;background:var(--gray)}
.prog-visita{padding:12px 16px;border-bottom:1px solid var(--gray2);display:flex;gap:12px}
.prog-visita.prog-ambos{background:rgba(0,180,172,.06)}
.prog-data{flex-shrink:0;text-align:center;width:46px}
.prog-dia{font-size:15px;font-weight:800;color:var(--text);line-height:1.2}
.prog-dow{font-size:9px;color:var(--text2);font-weight:600;text-transform:uppercase}
.prog-tag{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;margin-top:3px;display:inline-block}
.prog-tag.pt-ambos{background:var(--teal);color:#fff}
.prog-tag.pt-mc{background:var(--gray2);color:var(--text2)}
.prog-conteudo{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.prog-condo-bloco{padding:6px 8px;border-radius:6px;background:var(--gray)}
.prog-condo-bloco.mc-bloco{border-left:3px solid var(--teal)}
.prog-condo-bloco.mm-bloco{border-left:3px solid var(--turq);background:rgba(0,180,172,.05)}
.prog-condo-nome{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.prog-condo-nome.mc{color:var(--teal)}
.prog-condo-nome.mm{color:var(--turq-dk)}
.prog-grupo{margin-bottom:3px;display:flex;flex-wrap:wrap;gap:3px;align-items:flex-start}
.prog-itens{flex:1;font-size:10px;color:var(--text2);line-height:1.6}
.prog-export{margin:12px 16px 0}

/* ── Novos Condomínios ───────────────────────────────────────────────────── */
:root{--purple:#7D3C98;--purple-lt:#F4ECF7;--lime-dk:#6a8a1e;--amber:#D4A24C;--amber-dk:#A87826;--amber-lt:#FAF1DD}
.condo-card.condo-pp{border-color:var(--lime)}
.condo-card.condo-sc{border-color:var(--purple)}
.condo-card.condo-jm{border-color:var(--amber)}
.condo-pp .condo-card-top{background:var(--lime)}
.condo-sc .condo-card-top{background:var(--purple)}
.condo-jm .condo-card-top{background:var(--amber)}
.condo-pp .btn-visit{background:var(--lime)}
.condo-sc .btn-visit{background:var(--purple)}
.condo-jm .btn-visit{background:var(--amber-dk);color:#fff}
.visit-dot.pp{background:var(--lime)}
.visit-dot.sc{background:var(--purple)}
.visit-dot.jm{background:var(--amber)}
.hist-icon.pp{background:rgba(141,183,42,.12);color:var(--lime-dk)}
.hist-icon.sc{background:rgba(125,60,152,.12);color:var(--purple)}
.hist-icon.jm{background:rgba(212,162,76,.18);color:var(--amber-dk)}
.condo-opt.selected-pp{border-color:var(--lime);background:rgba(141,183,42,.07)}
.condo-opt.selected-sc{border-color:var(--purple);background:rgba(125,60,152,.07)}
.condo-opt.selected-jm{border-color:var(--amber);background:rgba(212,162,76,.1)}
.plano-tab.active-pp{border-color:var(--lime);background:rgba(141,183,42,.08);color:var(--lime-dk)}
.plano-tab.active-sc{border-color:var(--purple);background:rgba(125,60,152,.08);color:var(--purple)}
.plano-tab.active-jm{border-color:var(--amber);background:rgba(212,162,76,.12);color:var(--amber-dk)}
.plano-tabs{display:grid;grid-template-columns:1fr 1fr;padding:12px 16px;gap:8px}
.plano-tab{font-size:11.5px}
.cd-pip-sc{background:var(--purple)}
.cd-pip-jm{background:var(--amber)}
.cd-pip-pp{background:var(--lime)}
.prog-condo-bloco.pp-bloco{border-left:3px solid var(--lime);background:rgba(141,183,42,.05)}
.prog-condo-bloco.sc-bloco{border-left:3px solid var(--purple);background:rgba(125,60,152,.05)}
.prog-condo-bloco.jm-bloco{border-left:3px solid var(--amber);background:rgba(212,162,76,.07)}
.prog-condo-nome.pp{color:var(--lime-dk)}
.prog-condo-nome.sc{color:var(--purple)}
.prog-condo-nome.jm{color:var(--amber-dk)}
.visit-dot.tt{background:#5A7A7E}
.hist-icon.tt{background:rgba(90,122,126,.12);color:#3D5559}
.condo-opt.selected-tt{border-color:#5A7A7E;background:rgba(90,122,126,.07)}
.plano-tab.active-tt{border-color:#5A7A7E;background:rgba(90,122,126,.1);color:#3D5559}
.cd-pip-tt{background:#5A7A7E}
.prog-condo-bloco.tt-bloco{border-left:3px solid #5A7A7E;background:rgba(90,122,126,.05)}
.prog-condo-nome.tt{color:#3D5559}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.sn-logo-area{padding:16px 14px 14px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center}
.sn-logo-img{height:32px;object-fit:contain;filter:brightness(0) invert(1)}
.sn-nav-items{flex:1;padding:10px 0;display:flex;flex-direction:column;gap:1px}
.sn-btn{display:flex;align-items:center;gap:10px;padding:11px 18px;border:none;background:transparent;color:rgba(255,255,255,.68);cursor:pointer;font-size:13px;font-weight:500;text-align:left;width:100%;border-left:3px solid transparent;transition:all .18s}
.sn-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sn-btn:hover{background:rgba(255,255,255,.1);color:var(--white)}
.sn-btn.active{background:rgba(255,255,255,.14);color:var(--white);border-left-color:var(--turq);font-weight:700}
.sn-cta{background:var(--turq)!important;color:var(--white)!important;border-radius:8px;margin:6px 10px;padding:10px 14px!important;width:calc(100% - 20px)!important;border-left-color:transparent!important}
.sn-cta:hover{background:var(--turq-dk)!important}
.sn-footer{padding:10px 18px;border-top:1px solid rgba(255,255,255,.1)}
.sn-version{font-size:10px;color:rgba(255,255,255,.35)}

/* ── Responsivo Desktop ─────────────────────────────────────────────────── */
@media (min-width:768px){
  #app{max-width:100%}
  #app-body{flex-direction:row}
  #sidenav{display:flex;flex-direction:column;width:220px;min-width:220px;flex-shrink:0;background:var(--teal-dk);overflow-y:auto}
  #main{padding-bottom:16px}
  #bottomnav{display:none}
  .modal-overlay{align-items:center}
  .modal{border-radius:var(--r);max-width:480px;width:90%}
  .condo-grid{grid-template-columns:repeat(5,1fr)}
  .plano-tabs{grid-template-columns:repeat(5,1fr)}
  #header img{display:none}
  .home-hero h1{font-size:24px}
  .stats-grid{max-width:600px}
}
@media (min-width:1100px){
  #sidenav{width:240px;min-width:240px}
  #main > .form-section,.checklist-header,.relatorio-header{max-width:720px;margin-left:auto;margin-right:auto}
}

/* ── Fotos + Editor de Anotações ─────────────────────────────────────────── */
.fotos-section{margin-top:10px;padding-top:10px;border-top:1px dashed var(--gray2)}
.fotos-section-label{font-size:11px;font-weight:700;color:var(--gray4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.fotos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px;margin-bottom:8px}
.foto-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;background:var(--gray);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.foto-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.foto-thumb-del{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(192,0,0,.92);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
.foto-thumb-edit{position:absolute;bottom:2px;left:2px;width:20px;height:20px;border-radius:50%;background:rgba(21,91,103,.9);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0}
.foto-time{position:absolute;bottom:2px;right:24px;background:rgba(0,0,0,.72);color:#fff;font-size:8.5px;padding:2px 5px;border-radius:4px;cursor:pointer;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.foto-time:hover{background:rgba(21,91,103,.95)}
.fe-zoom-info{color:#fff;font-size:11px;background:#333;padding:6px 10px;border-radius:6px;font-weight:600;min-width:50px;text-align:center}
.btn-add-foto{width:100%;padding:9px;border:1.5px dashed var(--teal);border-radius:8px;background:rgba(21,91,103,.05);color:var(--teal);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-add-foto:hover{background:rgba(21,91,103,.1)}

.foto-editor-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:flex;align-items:center;justify-content:center;padding:0}
.foto-editor{width:100%;height:100%;display:flex;flex-direction:column;background:#1a1a1a}
.fe-toolbar{background:#222;padding:8px 10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid #333}
.fe-tools,.fe-colors{display:flex;gap:5px;align-items:center}
.fe-tool,.fe-color{width:38px;height:38px;border-radius:8px;border:2px solid transparent;background:#333;color:#fff;cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0}
.fe-tool.active{border-color:#00B4AC;background:#155B67}
.fe-color{padding:0}
.fe-color.active{border-color:#fff;box-shadow:0 0 0 2px #155B67}
.fe-undo,.fe-clear{padding:8px 12px;border:none;border-radius:6px;background:#444;color:#fff;cursor:pointer;font-size:12px;font-weight:600}
.fe-clear{background:#5C2020}
.fe-divider{width:1px;height:28px;background:#444}
.fe-canvas-wrap{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:10px;background:#0a0a0a;touch-action:none}
#fe-canvas{max-width:100%;max-height:100%;cursor:crosshair;box-shadow:0 4px 20px rgba(0,0,0,.5);background:#fff;touch-action:none}
.fe-footer{background:#222;padding:10px;display:flex;gap:10px;border-top:1px solid #333}
.fe-btn-cancel,.fe-btn-save{flex:1;padding:13px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.fe-btn-cancel{background:#444;color:#fff}
.fe-btn-save{background:#1B8A4A;color:#fff}
.fe-hint{font-size:11px;color:#999;text-align:center;padding:4px}

/* Camera capture */
.cam-view{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;z-index:1000}
#cam-video{flex:1;width:100%;object-fit:contain;background:#000;min-height:0}
.cam-topbar{position:absolute;top:0;left:0;right:0;padding:12px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);display:flex;justify-content:space-between;align-items:center;color:#fff;z-index:2}
.cam-topbar button{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer}
.cam-controls{padding:20px;background:#000;display:flex;align-items:center;justify-content:space-between;gap:14px}
.cam-btn-cancel,.cam-btn-switch,.cam-btn-file{width:54px;height:54px;border-radius:50%;border:none;background:rgba(255,255,255,.18);color:#fff;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cam-btn-shoot{width:78px;height:78px;border-radius:50%;border:5px solid #fff;background:#fff;cursor:pointer;font-size:26px;flex-shrink:0;box-shadow:0 0 0 4px rgba(255,255,255,.25);transition:transform .1s}
.cam-btn-shoot:active{transform:scale(.92)}
.cam-btn-shoot::after{content:'';display:block;width:60px;height:60px;border-radius:50%;background:#fff;border:2px solid #000;margin:auto}
.cam-error{padding:40px 20px;color:#fff;text-align:center}
.cam-error p{margin-bottom:14px;font-size:14px;line-height:1.5}
.cam-error button{padding:12px 20px;background:#155B67;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin:0 6px}

/* Assinatura Digital */
.sig-block{margin-bottom:14px}
.sig-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sig-label strong{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.sig-label button{background:transparent;border:1px solid var(--gray2);color:var(--text2);border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:600}
.sig-label button:hover{background:var(--gray)}
.sig-pad-wrap{position:relative;border:2px dashed var(--gray3);border-radius:10px;background:#fff;overflow:hidden}
.sig-pad-wrap.has-sig{border-color:var(--green);border-style:solid}
.sig-pad{width:100%;height:140px;display:block;cursor:crosshair;touch-action:none;background:#FAFBFC}
.sig-pad-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--gray3);font-size:13px;pointer-events:none;font-style:italic;flex-direction:column;gap:4px}

.preview-overlay{position:fixed;inset:0;background:#2a2a2a;z-index:200;display:flex;flex-direction:column}
.preview-topbar{background:#1a1a1a;color:#fff;padding:10px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid #333;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.4);z-index:2}

.preview-topbar .pt-back:hover{background:rgba(255,255,255,.1)}
.preview-titulo{flex:1;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;letter-spacing:.2px}
.preview-zoom{display:flex;align-items:center;gap:4px;background:#333;padding:3px 4px;border-radius:6px;flex-shrink:0}
.preview-zoom button{background:#444;border:none;color:#fff;width:30px;height:30px;border-radius:5px;cursor:pointer;font-size:14px;font-weight:700;padding:0;display:flex;align-items:center;justify-content:center}
.preview-zoom button:hover{background:#555}
.preview-zoom span{color:#fff;font-size:11px;font-weight:600;min-width:46px;text-align:center;padding:0 4px}
.preview-actions{display:flex;gap:6px;flex-shrink:0}
.preview-actions button{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;color:#fff}
.preview-actions .btn-share{background:#1B8A4A}
.preview-actions .btn-share:hover{background:#147239}
.preview-actions .btn-print{background:#155B67}
.preview-actions .btn-print:hover{background:#0D3C44}
.preview-body{flex:1;overflow:auto;padding:16px;background:#3a3a3a;-webkit-overflow-scrolling:touch;touch-action:auto}
.preview-page-wrap{transform-origin:top left;transition:transform .15s;display:inline-block;min-width:100%}
.preview-page{background:#fff;padding:18mm 16mm;width:210mm;max-width:none;box-shadow:0 4px 20px rgba(0,0,0,.5);margin:0 auto;color:#1A2E31;font-family:'Segoe UI',system-ui,sans-serif;font-size:12pt;line-height:1.5;border-radius:2px}
@media (max-width:480px){
  .preview-topbar{padding:8px 8px}
  .preview-titulo{font-size:11px;width:100%;order:-1;text-align:center;margin-bottom:4px}

  .preview-zoom button{width:28px;height:28px;font-size:13px}
  .preview-zoom span{font-size:10px;min-width:38px}
}

@media print{
  body>*:not(.preview-overlay){display:none!important}
  .preview-overlay{position:static!important;background:#fff!important;overflow:visible!important;height:auto!important;display:block!important}
  .preview-topbar{display:none!important}
  .preview-body{overflow:visible!important;padding:0!important;background:#fff!important;height:auto!important}
  .preview-page-wrap{transform:none!important;width:100%!important}
  .preview-page{padding:0!important;box-shadow:none!important;width:auto!important;border-radius:0!important}

// Espera supabase carregar (CDN pode demorar) — máximo 6 segundos
async function aguardarSupabase(maxMs=6000){
  const start=Date.now();
  while(!window.supabase && Date.now()-start<maxMs){
    await new Promise(r=>setTimeout(r,80));
  }
  if(window.supabase && !sb){
    try{ sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}}); }catch(e){console.warn('Supabase init tardio:',e);}
  }
  return !!sb;
}

(async()=>{
  const ok=await aguardarSupabase();
  if(!ok){ bloqueioPMP('semsessao'); return; }
  try{
    // Tenta getSession com até 3 retentativas (caso storage ainda esteja sincronizando entre subpastas)
    let session=null;
    for(let i=0;i<3;i++){
      const {data}=await sb.auth.getSession();
      if(data?.session){ session=data.session; break; }
      await new Promise(r=>setTimeout(r,250));
    }
    if(!session){ bloqueioPMP('semsessao'); return; }
    const u=session.user;
    const {data:vincs}=await sb.from('user_condos').select('role').eq('user_id',u.id);
    if(vincs && vincs.some(v=>v.role==='sindico')){
      bloqueioPMP('sindico');
      return;
    }
    const nome=u.user_metadata?.nome || (u.email?u.email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,c=>c.toUpperCase()):'');
    if(nome) window.usuarioLogadoNome=nome;
    document.body.classList.remove('auth-checking');
    const ld=document.getElementById('auth-gate-loading'); if(ld) ld.remove();
    if(typeof currentView!=='undefined' && currentView==='home' && typeof render==='function') render();
  }catch(e){
    console.warn('Auth check falhou:',e);
    bloqueioPMP('semsessao');
  }
})();

function getDeviceId(){
  let id=localStorage.getItem('device_id');
  if(!id){ id='dev-'+Math.random().toString(36).slice(2,10)+'-'+Date.now().toString(36); localStorage.setItem('device_id',id); }
  return id;
}

async function uploadVisita(v){
  if(!sb) return {ok:false,err:'supabase indisponível'};
  // Não re-uploadar visitas que o usuário marcou como deletadas (blacklist local)
  if(getDeletedIds().has(v.id)) return {ok:false,err:'visita deletada'};
  try{
    const result=await sb.from('visitas').upsert({
      id:v.id, condo_id:v.condoId, data:v.data, hora:v.hora||null,
      engenheiro:v.engenheiro||null, representante:v.representante||null,
      itens:v.itens||{}, obs_geral:v.obsGeral||null,
      tipo:v.tipo||'pmp',
      bloco:v.bloco||null, apartamento:v.apartamento||null, morador:v.morador||null,
      assinatura_eng:v.assinaturaEng||null, assinatura_resp:v.assinaturaResp||null,
      assinatura_resp_nome:v.assinaturaRespNome||null,
      assinatura_resp_doc:v.assinaturaRespDoc||null,
      assinatura_resp_funcao:v.assinaturaRespFuncao||null,
      itens_custom:v.itensCustom||null,
      device_id:getDeviceId()
    },{onConflict:'id'});
    const error=result.error;
    if(error){
      // Detecta blacklist server-side (banco bloqueou re-inserção de ID deletado)
      const msg=(error.message||'').toLowerCase();
      if(msg.includes('já foi excluída') || msg.includes('blacklist') || error.code==='P0001'){
        addDeletedId(v.id); // adiciona ao blacklist local
        // Remove do histórico local
        const hist=getHistorico().filter(x=>x.id!==v.id);
        localStorage.setItem('historico', JSON.stringify(hist));
        // Remove da fila de pendentes
        const pending=getPendingQueue().filter(p=>p.id!==v.id);
        setPendingQueue(pending);
        console.warn('Visita zombie removida do localStorage:', v.id);
        // Re-renderiza pra refletir limpeza
        if(typeof render==='function') render();
        return {ok:false, err:'visita-zombie-bloqueada', zombie:true};
      }
      return {ok:false,err:error.message};
    }
    return {ok:true};
  }catch(e){ return {ok:false,err:e.message}; }
}

// Converte registro Supabase (snake_case) -> visita local (camelCase)
function visitaFromRow(r){
  return {
    id:r.id, condoId:r.condo_id, data:r.data, hora:r.hora,
    tipo:r.tipo||'pmp',
    engenheiro:r.engenheiro, representante:r.representante,
    bloco:r.bloco, apartamento:r.apartamento, morador:r.morador,
    itens:r.itens||{}, obsGeral:r.obs_geral,
    assinaturaEng:r.assinatura_eng, assinaturaResp:r.assinatura_resp,
    assinaturaRespNome:r.assinatura_resp_nome, assinaturaRespDoc:r.assinatura_resp_doc, assinaturaRespFuncao:r.assinatura_resp_funcao,
    itensCustom:r.itens_custom||[],
    _updatedAt:r.updated_at
  };
}

async function downloadVisitas(){
  if(!sb) return {ok:false,err:'supabase indisponível'};
  try{
    const {data,error}=await sb.from('visitas').select('*').order('created_at',{ascending:false}).limit(200);
    if(error) return {ok:false,err:error.message};
    const deletadas=getDeletedIds(); // blacklist persistente — não ressuscita
    const remotas=(data||[]).map(visitaFromRow).filter(v=>!deletadas.has(v.id));
    const local=getHistorico().filter(v=>!deletadas.has(v.id));
    // Mescla: se a mesma visita estiver nos 2, mantém a mais recente (updated_at)
    const map={};
    [...local, ...remotas].forEach(v=>{
      if(deletadas.has(v.id)) return; // dupla proteção
      const existing=map[v.id];
      if(!existing) map[v.id]=v;
      else {
        const aT=new Date(existing._updatedAt||0).getTime();
        const bT=new Date(v._updatedAt||0).getTime();
        if(bT>=aT) map[v.id]=v;
      }
    });
    const merged=Object.values(map).sort((a,b)=>{
      const ad=a.data||'', bd=b.data||'';
      if(ad!==bd) return bd.localeCompare(ad);
      return new Date(b._updatedAt||0)-new Date(a._updatedAt||0);
    });
    localStorage.setItem('historico', JSON.stringify(merged.slice(0,200)));
    return {ok:true, count:merged.length, remotas:remotas.length};
  }catch(e){ return {ok:false,err:e.message}; }
}

async function syncTodasVisitas(silent=false){
  if(!sb){ if(!silent) showToast('☁ Sincronização indisponível'); return; }
  // 1. Upload de visitas locais que não estão na nuvem (ou são mais recentes)
  const hist=getHistorico();
  let ok=0, fail=0;
  for(const v of hist){
    const r=await uploadVisita(v);
    if(r.ok) ok++; else fail++;
  }
  // 2. Download de visitas remotas (de outros dispositivos)
  const d=await downloadVisitas();
  if(!silent){
    if(d.ok) showToast(`☁ ${d.remotas} visitas no banco · ${ok} enviadas${fail?' · '+fail+' falhas':''}`);
    else showToast('⚠ '+d.err);
  }
  // Re-renderiza a tela atual com dados atualizados
  if(d.ok && d.remotas>0) render();
  return {ok,fail,downloaded:d.ok?d.remotas:0};
}

// — Fila de retry para uploads que falharam (offline-first) —
const PENDING_KEY='pending_uploads';
function getPendingQueue(){ try{return JSON.parse(localStorage.getItem(PENDING_KEY)||'[]');}catch(e){return[];} }
function setPendingQueue(arr){ localStorage.setItem(PENDING_KEY,JSON.stringify(arr)); atualizarStatusSync(); }
function addToPendingQueue(visita){
  const pending=getPendingQueue();
  const filtered=pending.filter(p=>p.id!==visita.id);
  filtered.push(visita);
  setPendingQueue(filtered);
}
async function processPendingQueue(){
  if(!sb || !navigator.onLine) return;
  const pending=getPendingQueue();
  if(!pending.length) return;
  const stillPending=[];
  for(const v of pending){
    const r=await uploadVisita(v);
    if(!r.ok) stillPending.push(v);
  }
  setPendingQueue(stillPending);
  if(stillPending.length===0 && pending.length>0){
    showToast('✓ '+pending.length+' visita(s) sincronizada(s) agora');
  }
}

function demandasDoDia(condoId, dateStr){
  return _demandasProgPMP.filter(d => d.condo_id===condoId && d.data_programada===dateStr);
}

function demandasDoCondo(condoId, hojeStr){
  return _demandasProgPMP
    .filter(d => d.condo_id===condoId && (!hojeStr || d.data_programada>=hojeStr))
    .sort((a,b)=>(a.data_programada||'').localeCompare(b.data_programada||''));
}

function iniciarRealtimeDemandasPMP(){
  if(!sb || _demandasProgChannel) return;
  try{
    _demandasProgChannel = sb.channel('demandas-pmp-realtime')
      .on('postgres_changes', {event:'*', schema:'public', table:'demandas'}, ()=>carregarDemandasProgPMP())
      .subscribe();
  }catch(e){ console.warn('Realtime demandas falhou:',e); }
}

// — Realtime: recebe mudanças de outros dispositivos via WebSocket —
let _realtimeChannel=null;
function iniciarRealtime(){
  if(!sb || _realtimeChannel) return;
  try{
    _realtimeChannel=sb.channel('visitas-realtime')
      .on('postgres_changes', {event:'*', schema:'public', table:'visitas'}, payload=>{
        const local=getHistorico();
        if(payload.eventType==='DELETE'){
          const filtered=local.filter(v=>v.id!==payload.old?.id);
          localStorage.setItem('historico', JSON.stringify(filtered));
        } else {
          // INSERT ou UPDATE
          const novo=visitaFromRow(payload.new);
          // Ignora se for da nossa própria origem (já temos local)
          if(novo._updatedAt){
            const existing=local.find(v=>v.id===novo.id);
            if(existing && new Date(existing._updatedAt||0).getTime() >= new Date(novo._updatedAt).getTime()) return;
          }
          const idx=local.findIndex(v=>v.id===novo.id);
          if(idx>=0) local[idx]=novo;
          else local.unshift(novo);
          localStorage.setItem('historico', JSON.stringify(local.slice(0,200)));
        }
        // Re-renderiza apenas se está numa tela que mostra visitas
        if(['home','historico','condo-detail'].includes(currentView)) render();
        atualizarStatusSync(payload.eventType==='INSERT'?'+ nova visita':'atualizado');
      })
      .subscribe(status=>{
        console.log('☁ Realtime:',status);
        atualizarStatusSync();
      });
  }catch(e){ console.warn('Realtime falhou:',e); }
}

// Status visual no header
function atualizarStatusSync(extraInfo){
  const el=document.getElementById('sync-status');
  if(!el) return;
  const pendingCount=getPendingQueue().length;
  if(!sb){
    el.innerHTML='⚠'; el.title='Supabase indisponível'; el.style.color='#FBC02D';
  } else if(!navigator.onLine){
    el.innerHTML='📴'; el.title='Sem internet — '+(pendingCount?pendingCount+' visita(s) na fila':'tudo salvo localmente'); el.style.color='#E67E22';
  } else if(pendingCount>0){
    el.innerHTML='⏳<sup style="font-size:9px">'+pendingCount+'</sup>'; el.title=pendingCount+' visita(s) aguardando sincronização'; el.style.color='#FBC02D';
  } else {
    el.innerHTML='☁'; el.title='Tempo real ativo · clique para sincronizar manualmente'; el.style.color='#fff';
  }
  if(extraInfo){
    el.style.background='rgba(27,138,74,.4)'; el.style.borderRadius='12px'; el.style.padding='3px 9px';
    setTimeout(()=>{ el.style.background=''; el.style.padding='0 10px'; },2000);
  }
}

// Next wednesday calc
function proximaQuarta(from=new Date()){
  const d=new Date(from);
  const dia=d.getDay();
  const diff=(3-dia+7)%7||7;
  d.setDate(d.getDate()+diff);
  return d;
}
function fmtDate(d){
  return d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
}
function fmtDateShort(d){
  if(typeof d==='string') return d;
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
// Converte data ISO (YYYY-MM-DD) para padrão brasileiro (DD/MM/YYYY)
function fmtBR(iso){
  if(!iso) return '—';
  const m=String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[3]}/${m[2]}/${m[1]}`;
  return iso;
}

function getHistorico(){
  try{ return JSON.parse(localStorage.getItem('historico')||'[]') }
  catch(e){ return [] }
}
function saveVisita(v){
  const h=getHistorico();
  const idx=h.findIndex(x=>x.id===v.id);
  if(idx>=0) h.splice(idx,1);
  // Marca timestamp local pra resolver conflitos no realtime
  v._updatedAt=new Date().toISOString();
  h.unshift(v);
  localStorage.setItem('historico', JSON.stringify(h.slice(0,100)));
  // Upload async — se falhar, vai pra fila de retry
  uploadVisita(v).then(r=>{
    if(r.ok){ console.log('☁ Visita sincronizada:',v.id); }
    else {
      console.warn('☁ Falha no upload, adicionando à fila:',r.err);
      addToPendingQueue(v);
    }
  });
}

function navigate(view, push=true){
  if(push && currentView!==view) navStack.push(currentView);
  currentView = view;
  render();
  document.getElementById('main').scrollTop=0;
}
function goBack(){
  const v = navStack.pop();
  if(v) navigate(v, false);
  else   navigate('home', false);
}

function setHeader(title, showBack=false, actions=''){
  document.getElementById('header-title').textContent = title;
  const bb = document.getElementById('btn-back');
  showBack ? bb.classList.remove('hidden') : bb.classList.add('hidden');
  document.getElementById('header-actions').innerHTML = actions;
}
function setNavActive(id){
  document.querySelectorAll('.nav-btn,.sn-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
  const snId=id.replace(/^nav-/,'sn-');
  const sn=document.getElementById(snId);
  if(sn) sn.classList.add('active');
}

// Ativa correção ortográfica pt-BR em todos os campos de texto após cada render
function aplicarSpellcheckPtBR(){
  const root = document.getElementById('main');
  if(!root) return;
  const tipos = new Set(['text','search','url',undefined,null,'']);
  root.querySelectorAll('textarea').forEach(el=>{
    if(!el.hasAttribute('spellcheck')) el.setAttribute('spellcheck','true');
    el.setAttribute('lang','pt-BR');
    if(!el.hasAttribute('autocorrect')) el.setAttribute('autocorrect','on');
    if(!el.hasAttribute('autocapitalize')) el.setAttribute('autocapitalize','sentences');
  });
  root.querySelectorAll('input').forEach(el=>{
    const t=(el.getAttribute('type')||'text').toLowerCase();
    if(!tipos.has(t)) return;
    if(el.id==='cfg-apikey') return; // chave de API: sem spellcheck
    if(!el.hasAttribute('spellcheck')) el.setAttribute('spellcheck','true');
    el.setAttribute('lang','pt-BR');
    if(!el.hasAttribute('autocorrect')) el.setAttribute('autocorrect','on');
    if(!el.hasAttribute('autocapitalize')) el.setAttribute('autocapitalize','sentences');
  });
}

function renderDemandasProgramadasHome(hojeStr){
  const futuras = _demandasProgPMP.filter(d => (d.data_programada||'') >= hojeStr).slice(0,6);
  const atrasadas = _demandasProgPMP.filter(d => (d.data_programada||'') < hojeStr && d.status!=='resolvida');

function abrirDemandaPMP(id){
  const d=_demandasProgPMP.find(x=>x.id===id);
  if(!d){ alert('Demanda não encontrada'); return; }
  const cd=CONDOMINIOS[d.condo_id]||{nome:d.condo_id,short:d.condo_id,cor:'#155B67'};
  const cats={corretiva:'🔧 Manutenção corretiva',duvida:'❓ Dúvida técnica',reforma:'🏗️ Aprovação de reforma',laudo:'📋 Solicitação de laudo',emergencia:'🚨 Emergência',documento:'📄 Documento'};
  const urgs={baixa:'🟢 Baixa',media:'🟡 Média',alta:'🔴 Alta'};
  const statusLbl={aberta:'🆕 Aberta',em_andamento:'⏳ Em andamento',resolvida:'✅ Resolvida',fechada:'🔒 Fechada'};
  const fotos=d.fotos||[];
  const dt=d.data_programada?d.data_programada.split('-').reverse().join('/'):'—';
  const ehVisita = /visita|inspe|laudo|per[ií]cia/i.test(d.tipo_programado||'visita');

  const ov=document.createElement('div');
  ov.id='dem-pmp-overlay';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto';
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`

function iniciarVisitaDeDemanda(id){
  const d=_demandasProgPMP.find(x=>x.id===id);
  if(!d) return;
  document.getElementById('dem-pmp-overlay')?.remove();
  // Vincula a demanda à visita atual
  sessionStorage.setItem('demandaVinculada', JSON.stringify({
    id:d.id, protocolo:d.protocolo, titulo:d.titulo, tipo:d.tipo_programado, descricao:d.descricao_programada
  }));
  iniciarVisita(d.condo_id, d.data_programada);
}

async function marcarDemandaResolvida(id){
  if(!confirm('Marcar esta demanda como resolvida?')) return;
  try{
    const {error}=await sb.from('demandas').update({status:'resolvida',updated_at:new Date().toISOString()}).eq('id',id);
    if(error) throw error;
    document.getElementById('dem-pmp-overlay')?.remove();
    carregarDemandasProgPMP();
    showToast('✓ Demanda marcada como resolvida');
  }catch(e){ alert('Erro: '+e.message); }
}

// EVENTOS EXTRAS por condomínio (atividades pontuais além da rotina)
// ═══════════════════════════════════════════════════════════════════════════
function getEventos(condoId){
  try{
    const all=JSON.parse(localStorage.getItem('eventos_extras')||'{}');
    return (all[condoId]||[]).sort((a,b)=>a.data.localeCompare(b.data));
  }catch(e){ return []; }
}
function setEventos(condoId, lista){
  const all=JSON.parse(localStorage.getItem('eventos_extras')||'{}');
  all[condoId]=lista;
  localStorage.setItem('eventos_extras', JSON.stringify(all));
  // Sincroniza com Supabase (cada evento como linha em app_config com key='evento_<id>')
  if(sb){
    sb.from('app_config').upsert({key:'eventos_'+condoId, value:lista, updated_at:new Date().toISOString()}).then(r=>{
      if(r.error) console.warn('Erro ao sincronizar eventos:',r.error);
    });
  }
}
async function carregarEventosRemotos(){
  if(!sb) return;
  try{
    const {data,error}=await sb.from('app_config').select('*').like('key','eventos_%');
    if(error || !data) return;
    // Merge não-destrutivo: preserva eventos locais que ainda não foram sincronizados
    const all=JSON.parse(localStorage.getItem('eventos_extras')||'{}');
    data.forEach(row=>{
      const condoId=row.key.replace('eventos_','');
      const remotos=row.value||[];
      const locais=all[condoId]||[];
      // Une por id, remoto vence em caso de conflito
      const map={};
      locais.forEach(e=>{ if(e&&e.id) map[e.id]=e; });
      remotos.forEach(e=>{ if(e&&e.id) map[e.id]=e; });
      all[condoId]=Object.values(map).sort((a,b)=>(a.data||'').localeCompare(b.data||''));
    });
    localStorage.setItem('eventos_extras', JSON.stringify(all));
    if(currentView==='condo-detail') render();
  }catch(e){ console.warn('Erro ao baixar eventos:',e); }
}

// ASSINATURA DIGITAL (canvas + toque/mouse)
// ═══════════════════════════════════════════════════════════════════════════
const _sigPads={};
function initSigPad(canvasId, dataURLInicial, onSave){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const wrap=canvas.closest('.sig-pad-wrap');
  const ph=document.getElementById(canvasId+'-ph');
  const ctx=canvas.getContext('2d');
  const setSize=()=>{
    const r=canvas.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    canvas.width=r.width*dpr; canvas.height=r.height*dpr;
    ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
    ctx.strokeStyle='#1A2E31'; ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.lineJoin='round';
  };
  setSize();
  setTimeout(setSize,80);
  let drawing=false, hasContent=!!dataURLInicial;
  if(dataURLInicial){
    const img=new Image();
    img.onload=()=>{ ctx.drawImage(img,0,0,canvas.width/(window.devicePixelRatio||1),canvas.height/(window.devicePixelRatio||1)); if(ph)ph.style.display='none'; wrap?.classList.add('has-sig'); };
    img.src=dataURLInicial;
  }
  const getPos=ev=>{
    const r=canvas.getBoundingClientRect();
    const t=ev.touches?ev.touches[0]:ev;
    return {x:t.clientX-r.left, y:t.clientY-r.top};
  };
  const start=ev=>{
    ev.preventDefault();
    drawing=true;
    const p=getPos(ev);
    ctx.beginPath(); ctx.moveTo(p.x,p.y);
    if(!hasContent){ hasContent=true; if(ph)ph.style.display='none'; wrap?.classList.add('has-sig'); }
  };
  const move=ev=>{ if(!drawing)return; ev.preventDefault(); const p=getPos(ev); ctx.lineTo(p.x,p.y); ctx.stroke(); };
  const end=()=>{ if(!drawing)return; drawing=false; if(hasContent && onSave) onSave(canvas.toDataURL('image/png')); };
  canvas.addEventListener('mousedown',start);
  canvas.addEventListener('mousemove',move);
  canvas.addEventListener('mouseup',end);
  canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});
  canvas.addEventListener('touchmove',move,{passive:false});
  canvas.addEventListener('touchend',end);
  _sigPads[canvasId]={canvas,ctx,clear:()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    hasContent=false; if(ph)ph.style.display='flex'; wrap?.classList.remove('has-sig');
    if(onSave) onSave(null);
  }};
}
function limparAssinatura(canvasId){ _sigPads[canvasId]?.clear(); }

let editorState={itemId:null,bgImage:null,annotations:[],tool:'circle',color:'#C00000',drawing:false,fotoIndex:-1,selectedIdx:-1,zoom:1,dragX:0,dragY:0,pinching:false,pinchStart:0,zoomStart:1,defaultFontSize:null,resizing:false,resizeHandle:null};

// Hit-test em uma alça (handle) da anotação selecionada
function hitTestHandle(p,a){
  if(!a) return null;
  const r=Math.max(28,(editorState.bgImage?.width||1000)/40);
  if(a.type==='arrow'){
    if(Math.hypot(p.x-a.x,p.y-a.y)<r) return 'start';
    if(Math.hypot(p.x-a.x2,p.y-a.y2)<r) return 'end';
  } else if(a.type==='circle'){
    const pts=[['nw',a.x,a.y],['ne',a.x2,a.y],['sw',a.x,a.y2],['se',a.x2,a.y2]];
    for(const [n,hx,hy] of pts){ if(Math.hypot(p.x-hx,p.y-hy)<r) return n; }
  } else if(a.type==='text'){
    // alça para resize de fonte (canto inferior direito)
    const fs=a.fontSize||Math.max(26,(editorState.bgImage?.width||1000)/38);
    const tmp=document.createElement('canvas').getContext('2d');
    tmp.font=`bold ${fs}px Arial,sans-serif`;
    const w=tmp.measureText(a.text).width;
    if(Math.hypot(p.x-(a.x+w),p.y-(a.y+fs*0.2))<r) return 'fontsize';
  }
  return null;
}
